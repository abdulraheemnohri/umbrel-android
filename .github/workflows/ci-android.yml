name: Android CI

on:
  push:
    paths:
      - 'packages/android/**'
  pull_request:
    paths:
      - 'packages/android/**'

jobs:
  lint-test:
    name: Lint and Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x packages/android/umbrel-app/gradlew

      - name: Run Lint
        run: ./gradlew :app:lintDebug
        working-directory: packages/android/umbrel-app

      - name: Run Unit Tests
        run: ./gradlew :app:testDebugUnitTest
        working-directory: packages/android/umbrel-app
