name: Build Debug APK

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle
          cache-dependency-path: packages/android/umbrel-app/*.gradle*

      - name: Grant execute permission for gradlew
        run: chmod +x packages/android/umbrel-app/gradlew

      - name: Run Lint
        run: gradle :app:lintDebug
        working-directory: packages/android/umbrel-app

      - name: Run Unit Tests
        run: gradle :app:testDebugUnitTest
        working-directory: packages/android/umbrel-app

      - name: Build Debug APK
        run: gradle :app:assembleDebug
        working-directory: packages/android/umbrel-app

      - name: List Generated APKs
        run: |
          ls -R app/build/outputs/apk/debug/ || echo "No APKs found"
        working-directory: packages/android/umbrel-app

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: umbrel-android-debug
          path: packages/android/umbrel-app/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
