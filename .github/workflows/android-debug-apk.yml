name: Build Debug APK

on:
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x packages/android/umbrel-app/gradlew
        working-directory: .

      - name: Run Lint
        run: ./gradlew :app:lintDebug
        working-directory: packages/android/umbrel-app

      - name: Run Unit Tests
        run: ./gradlew :app:testDebugUnitTest
        working-directory: packages/android/umbrel-app

      - name: Build with Gradle
        run: ./gradlew :app:assembleDebug
        working-directory: packages/android/umbrel-app

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: umbrel-android-debug
          path: packages/android/umbrel-app/app/build/outputs/apk/debug/*.apk
