name: Umbrel Android Pipeline

on:
  push:
    branches: [ master, main ]
    paths:
      - 'packages/android/**'
      - '.github/workflows/android-pipeline.yml'
  pull_request:
    branches: [ master, main ]
    paths:
      - 'packages/android/**'
  workflow_dispatch:
    inputs:
      buildType:
        description: 'Type of build to run'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release
      versionName:
        description: 'Version Name (for release only)'
        required: false
        default: '0.1.0'
      versionCode:
        description: 'Version Code (for release only)'
        required: false
        default: '1'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.parallel=true"

jobs:
  validate-and-test:
    name: Validate and Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.2

      - name: Run Lint
        run: gradle :app:lintDebug
        working-directory: packages/android/umbrel-app

      - name: Run Unit Tests
        run: gradle :app:testDebugUnitTest
        working-directory: packages/android/umbrel-app

  build-debug:
    name: Build Debug APK
    needs: validate-and-test
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.buildType == 'debug')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.2

      - name: Build Debug APK
        run: gradle :app:assembleDebug
        working-directory: packages/android/umbrel-app

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: umbrel-android-debug
          path: packages/android/umbrel-app/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

  build-release:
    name: Build Signed Release APK
    needs: validate-and-test
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.buildType == 'release'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.2

      - name: Decode Keystore
        run: |
          echo "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" | base64 --decode > packages/android/umbrel-app/app/keystore.jks

      - name: Build Signed Release APK
        run: |
          gradle :app:assembleRelease             -Pandroid.injected.version.name=${{ github.event.inputs.versionName }}             -Pandroid.injected.version.code=${{ github.event.inputs.versionCode }}
        working-directory: packages/android/umbrel-app
        env:
          KEYSTORE_PATH: "keystore.jks"
          KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}

      - name: APK Size Check
        run: |
          ls -lh app/build/outputs/apk/release/*.apk | awk '{print "APK Size: " $5}'
        working-directory: packages/android/umbrel-app
        shell: bash

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.versionName }}
          name: Umbrel Android v${{ github.event.inputs.versionName }}
          draft: false
          prerelease: false
          files: packages/android/umbrel-app/app/build/outputs/apk/release/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
