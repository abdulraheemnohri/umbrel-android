name: Build Release APK

on:
  workflow_dispatch:
    inputs:
      versionName:
        description: 'Version Name (e.g., 0.1.0)'
        required: true
        default: '0.1.0'
      versionCode:
        description: 'Version Code (e.g., 1)'
        required: true
        default: '1'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build Signed Release APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle
          cache-dependency-path: packages/android/umbrel-app/*.gradle*

      - name: Decode Keystore
        run: |
          echo "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" | base64 --decode > packages/android/umbrel-app/app/keystore.jks

      - name: Run Lint and Tests
        run: gradle :app:lintRelease :app:testReleaseUnitTest
        working-directory: packages/android/umbrel-app
        env:
          KEYSTORE_PATH: "keystore.jks"
          KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}

      - name: Build and Sign Release APK
        run: gradle :app:assembleRelease -Pandroid.injected.version.name=${{ github.event.inputs.versionName }} -Pandroid.injected.version.code=${{ github.event.inputs.versionCode }}
        working-directory: packages/android/umbrel-app
        env:
          KEYSTORE_PATH: "keystore.jks"
          KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}

      - name: APK Size Check
        run: |
          ls -lh app/build/outputs/apk/release/*.apk | awk '{print "APK Size: " $5}'
        working-directory: packages/android/umbrel-app
        shell: bash

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.versionName }}
          name: Umbrel Android v${{ github.event.inputs.versionName }}
          draft: false
          prerelease: false
          files: packages/android/umbrel-app/app/build/outputs/apk/release/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
